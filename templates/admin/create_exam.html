{% extends "base.html" %}
{% block title %}Schedule Exam — PSC Trainer{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="fas fa-calendar-plus"></i> Schedule New Exam</h1>
  <p>Set up a timed mock test for students.</p>
</div>

<div class="card" style="max-width:600px;margin:0 auto;">
  <div class="card-body">
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="POST">
      <div style="margin-bottom:1.2rem;">
        <label style="display:block;font-weight:600;margin-bottom:0.4rem;">Exam Title</label>
        <input type="text" name="title" class="form-input" placeholder="e.g. Kerala PSC LDC Mock Test 1" required
          style="width:100%;padding:0.7rem;border:1px solid var(--gray-300);border-radius:8px;">
      </div>

      <div style="margin-bottom:1.2rem;">
        <label style="display:block;font-weight:600;margin-bottom:0.4rem;">Subject</label>
        <input type="text" name="subject" class="form-input" placeholder="e.g. General Knowledge" required
          style="width:100%;padding:0.7rem;border:1px solid var(--gray-300);border-radius:8px;">
      </div>

      <div style="display:flex;gap:1rem;margin-bottom:1.2rem;">
        <div style="flex:1;">
          <label style="display:block;font-weight:600;margin-bottom:0.4rem;">Difficulty</label>
          <select name="difficulty" style="width:100%;padding:0.7rem;border:1px solid var(--gray-300);border-radius:8px;">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div style="flex:1;">
          <label style="display:block;font-weight:600;margin-bottom:0.4rem;">No. of Questions</label>
          <input type="number" name="count" value="10" min="1" max="50" required
            style="width:100%;padding:0.7rem;border:1px solid var(--gray-300);border-radius:8px;">
        </div>
      </div>

      <div style="margin-bottom:1.2rem;">
        <label style="display:block;font-weight:600;margin-bottom:0.4rem;">Question Source</label>
        <select name="question_source" style="width:100%;padding:0.7rem;border:1px solid var(--gray-300);border-radius:8px;">
          <option value="bank">From existing question bank (filtered by subject)</option>
          <option value="ai">Generate fresh with AI</option>
        </select>
      </div>

      <div style="display:flex;gap:1rem;margin-bottom:1.5rem;">
        <div style="flex:1;">
          <label style="display:block;font-weight:600;margin-bottom:0.4rem;">Start Time</label>
          <input type="datetime-local" name="start_time" required
            style="width:100%;padding:0.7rem;border:1px solid var(--gray-300);border-radius:8px;">
        </div>
        <div style="flex:1;">
          <label style="display:block;font-weight:600;margin-bottom:0.4rem;">Duration (minutes)</label>
          <input type="number" name="duration_minutes" value="30" min="5" max="300" required
            style="width:100%;padding:0.7rem;border:1px solid var(--gray-300);border-radius:8px;">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        <i class="fas fa-calendar-check"></i> Schedule Exam
      </button>
    </form>
  </div>
</div>
{% endblock %}
