{% extends "base.html" %}
{% block title %}Add Question — PSC Trainer{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="fas fa-plus"></i> Add Question</h1>
  <p>Add a new MCQ question to the question bank.</p>
</div>
<div style="max-width:600px;margin:0 auto;padding:0 1.5rem;">
  {% if msg %}<div class="alert alert-success">{{ msg }}</div>{% endif %}
  <div class="card">
    <div class="card-body">
      <form method="POST" style="display:flex;flex-direction:column;gap:1.2rem;">
        <div class="form-group">
          <label>Question</label>
          <textarea name="question" rows="3" placeholder="Enter the question..." required></textarea>
        </div>
        <div class="form-group"><label>Option A</label><input type="text" name="option_a" required/></div>
        <div class="form-group"><label>Option B</label><input type="text" name="option_b" required/></div>
        <div class="form-group"><label>Option C</label><input type="text" name="option_c" required/></div>
        <div class="form-group"><label>Option D</label><input type="text" name="option_d" required/></div>
        <div class="form-group">
          <label>Correct Answer</label>
          <select name="answer" required>
            <option value="">Select correct option</option>
            <option>A</option><option>B</option><option>C</option><option>D</option>
          </select>
        </div>
        <div class="form-group">
          <label>Subject</label>
          <select name="subject" required>
            <option value="">Select subject</option>
            <option>Kerala History</option><option>Indian History</option>
            <option>General Knowledge</option><option>Current Affairs</option>
            <option>Mathematics</option><option>Science</option>
            <option>Malayalam</option><option>English</option>
          </select>
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select name="difficulty" required>
            <option value="">Select difficulty</option>
            <option>Easy</option><option>Medium</option><option>Hard</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-save"></i> Save Question</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
